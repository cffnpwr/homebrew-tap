name: Bump formula
on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name in this tap, without the tap prefix
        required: true
        type: string
      version:
        description: Version to bump to, without the leading "v"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow_ref }}-${{ inputs.formula }}-${{ inputs.version }}
  cancel-in-progress: false

permissions: {}

env:
  FORMULA: cffnpwr/tap/${{ inputs.formula }}
  BRANCH: bump-${{ inputs.formula }}-${{ inputs.version }}
  BOTTLE_ROOT_URL: https://ghcr.io/v2/cffnpwr/tap

jobs:
  bump:
    name: Bump formula
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Validate inputs
        env:
          VERSION: ${{ inputs.version }}
          INPUT_FORMULA: ${{ inputs.formula }}
        run: |-
          set -eu
          # Formula names are matched by HOMEBREW_TAP_FORMULA_NAME_REGEX (`[\w+\-.@]+`)
          # in Homebrew's Library/Homebrew/tap_constants.rb, restricted to lowercase
          # because tap file names must be lowercase and Formulary downcases every
          # reference before resolving it.
          # https://github.com/Homebrew/brew/blob/main/Library/Homebrew/tap_constants.rb
          # https://docs.brew.sh/Formula-Cookbook#a-quick-word-on-naming
          if ! printf '%s' "$INPUT_FORMULA" | grep -Eq '^[a-z0-9][a-z0-9+.@_-]*$'; then
            echo "formula must be a bare lowercase formula name, got '$INPUT_FORMULA'" >&2
            exit 1
          fi

          # `brew bump-formula-pr --version` rewrites the url by substituting the
          # formula's current version string, which never carries a leading "v".
          # https://github.com/Homebrew/brew/blob/main/Library/Homebrew/dev-cmd/bump-formula-pr.rb
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9][0-9a-zA-Z.+_-]*$'; then
            echo "version must start with a digit and carry no leading 'v', got '$VERSION'" >&2
            exit 1
          fi

      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Rewrite url and sha256
        env:
          VERSION: ${{ inputs.version }}
        run: |-
          set -eu
          current=$(brew info --json=v2 --formula "$FORMULA" | jq -r '.formulae[0].versions.stable')
          if [ "$current" = "$VERSION" ]; then
            echo "$FORMULA is already at $VERSION, keeping url and sha256 as is"
            exit 0
          fi
          brew bump-formula-pr --write-only --no-audit --version="$VERSION" "$FORMULA"

      - name: Push bump branch
        env:
          VERSION: ${{ inputs.version }}
          INPUT_FORMULA: ${{ inputs.formula }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          set -eu
          cd "$(brew --repository cffnpwr/tap)"
          app_user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${app_user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          if ! git diff --quiet; then
            git commit -am "chore(${INPUT_FORMULA}): :package: bump to $VERSION"
          fi
          git push --force origin "$BRANCH"

  bottle:
    name: Build bottle (${{ matrix.name }})
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 26 arm64
            runner: macos-26
          - name: macOS 15 arm64
            runner: macos-15
          - name: Linux x86_64
            runner: ubuntu-24.04
            container: ghcr.io/homebrew/brew:main@sha256:3dfa5bc4aef6ccdd8d7b1155ebebb76840ba4fa1432e2bcd6a91ba6147bb8317
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            container: ghcr.io/homebrew/brew:main@sha256:3dfa5bc4aef6ccdd8d7b1155ebebb76840ba4fa1432e2bcd6a91ba6147bb8317
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Check out bump branch
        run: |-
          set -eu
          cd "$(brew --repository cffnpwr/tap)"
          git fetch --force origin "$BRANCH:refs/remotes/origin/$BRANCH"
          git checkout --force -B "$BRANCH" "refs/remotes/origin/$BRANCH"

      - name: Build bottle
        run: |-
          set -eu
          mkdir -p "$RUNNER_TEMP/bottles"
          cd "$RUNNER_TEMP/bottles"
          brew install --formula --build-bottle --verbose "$FORMULA"
          brew test --verbose "$FORMULA"
          brew bottle --json --no-rebuild --root-url="$BOTTLE_ROOT_URL" "$FORMULA"

      - name: Upload bottle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottle-${{ inputs.formula }}-${{ matrix.runner }}
          path: ${{ runner.temp }}/bottles/*.bottle.*
          if-no-files-found: error

  publish:
    name: Publish bottles
    needs:
      - bump
      - bottle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check out bump branch
        run: |-
          set -eu
          cd "$(brew --repository cffnpwr/tap)"
          git fetch --force origin "$BRANCH:refs/remotes/origin/$BRANCH"
          git checkout --force -B "$BRANCH" "refs/remotes/origin/$BRANCH"

      - name: Download bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/bottles
          pattern: bottle-${{ inputs.formula }}-*
          merge-multiple: true

      - name: Publish bottles to GitHub Packages
        env:
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          set -eu
          cd "$RUNNER_TEMP/bottles"
          brew pr-upload --verbose --no-commit --warn-on-upload-failure --root-url="$BOTTLE_ROOT_URL"

      - name: Push bottle block
        env:
          VERSION: ${{ inputs.version }}
          INPUT_FORMULA: ${{ inputs.formula }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          set -eu
          cd "$(brew --repository cffnpwr/tap)"
          app_user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${app_user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git commit -am "chore(${INPUT_FORMULA}): :package: add $VERSION bottles"
          fi
          git push origin "$BRANCH"

      - name: Open pull request and enable auto-merge
        env:
          VERSION: ${{ inputs.version }}
          INPUT_FORMULA: ${{ inputs.formula }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          set -eu
          cd "$(brew --repository cffnpwr/tap)"
          if [ -z "$(git rev-list "origin/main..$BRANCH")" ]; then
            echo "$BRANCH carries no changes over main, nothing to merge"
            exit 0
          fi
          if [ -z "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "chore(${INPUT_FORMULA}): :package: bump to $VERSION" \
              --body "Bump \`${INPUT_FORMULA}\` to $VERSION. Bottles for this version are already published to GitHub Packages."
          fi
          gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "$BRANCH"
