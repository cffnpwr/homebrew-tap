name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  syntax:
    name: Tap syntax
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/homebrew/brew:main@sha256:68818c874990dc596744a904a209ef156dcafbaaba169a2ad85edea8c1878305
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Check formula style
        run: brew style cffnpwr/tap

      - name: Read all formulae
        run: brew readall --aliases --os=all --arch=all cffnpwr/tap

      - name: Audit formulae
        run: brew audit --online --strict --except=installed --tap=cffnpwr/tap

  formulae:
    name: List formulae
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      names: ${{ steps.list.outputs.names }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Collect formula names
        id: list
        run: |-
          set -eu
          names=$(find Formula -name '*.rb' -exec basename {} .rb \; | sort | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "names=$names" >> "$GITHUB_OUTPUT"

  install:
    name: Install ${{ matrix.formula }} (${{ matrix.platform.name }})
    needs: formulae
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.formulae.outputs.names) }}
        platform:
          - name: macOS 26 arm64
            runner: macos-26
          - name: macOS 15 arm64
            runner: macos-15
          - name: Linux x86_64
            runner: ubuntu-24.04
            container: ghcr.io/homebrew/brew:main@sha256:68818c874990dc596744a904a209ef156dcafbaaba169a2ad85edea8c1878305
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            container: ghcr.io/homebrew/brew:main@sha256:68818c874990dc596744a904a209ef156dcafbaaba169a2ad85edea8c1878305
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Install and test formula
        env:
          FORMULA_NAME: ${{ matrix.formula }}
        run: |-
          set -eu
          formula="cffnpwr/tap/$FORMULA_NAME"
          brew install --formula --verbose "$formula"
          brew linkage --test "$formula"
          brew test --verbose "$formula"

  source-build:
    name: Build ${{ matrix.formula }} from source
    needs: formulae
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/homebrew/brew:main@sha256:68818c874990dc596744a904a209ef156dcafbaaba169a2ad85edea8c1878305
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.formulae.outputs.names) }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Build formula from source and test
        env:
          FORMULA_NAME: ${{ matrix.formula }}
        run: |-
          set -eu
          formula="cffnpwr/tap/$FORMULA_NAME"
          brew install --formula --build-from-source --verbose "$formula"
          brew linkage --test "$formula"
          brew test --verbose "$formula"
